<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2A5C"/>
      <stop offset="55%" stop-color="#1E54B7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle decorative grid dots -->
  <g fill="#FFFFFF" opacity="0.08">
    <circle cx="60" cy="40" r="3"/><circle cx="100" cy="40" r="3"/><circle cx="140" cy="40" r="3"/>
    <circle cx="60" cy="80" r="3"/><circle cx="100" cy="80" r="3"/><circle cx="140" cy="80" r="3"/>
    <circle cx="1100" cy="240" r="3"/><circle cx="1140" cy="240" r="3"/><circle cx="1060" cy="240" r="3"/>
    <circle cx="1100" cy="270" r="3"/><circle cx="1140" cy="270" r="3"/><circle cx="1060" cy="270" r="3"/>
  </g>

  <!-- two overlapping "image" cards representing duplicate detection -->
  <g transform="translate(80,95)">
    <rect x="14" y="14" width="92" height="92" rx="12" fill="#FFFFFF" opacity="0.18"/>
    <rect x="0" y="0" width="92" height="92" rx="12" fill="#FFFFFF"/>
    <circle cx="28" cy="28" r="10" fill="#3B82F6"/>
    <path d="M8 70 L34 44 L52 60 L66 40 L86 70 Z" fill="#1E54B7"/>
    <!-- magnifier scanning the cards -->
    <g>
      <circle cx="78" cy="78" r="16" fill="none" stroke="#0F2A5C" stroke-width="5"/>
      <line x1="89" y1="89" x2="104" y2="104" stroke="#0F2A5C" stroke-width="6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 6 -4; 0 0; -4 6; 0 0" dur="3.2s" repeatCount="indefinite" additive="sum"/>
    </g>
    <!-- pulse ring to suggest "scanning" -->
    <circle cx="78" cy="78" r="16" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.0">
      <animate attributeName="r" values="14;30;14" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- title -->
  <text x="230" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">
    CLIP Similar &amp; Duplicate
  </text>
  <text x="230" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">
    Image Finder
  </text>
  <text x="232" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#CFE0FF">
    Vision-Language embeddings &#183; cosine similarity &#183; exact-duplicate flagging
  </text>

  <!-- divider line -->
  <line x1="232" y1="216" x2="900" y2="216" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>

  <!-- signature bottom-right -->
  <g transform="translate(950,250)">
    <circle cx="14" cy="14" r="14" fill="#FFFFFF"/>
    <path d="M14 5 a9 9 0 1 0 0.001 0 M14 6.5c-4 0-7 2.6-7.6 6.1C8 11 10.7 9.7 14 9.7s6 1.3 7.6 2.4C20.9 9.1 18 6.5 14 6.5z"
          fill="#1E54B7"/>
    <text x="36" y="11" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">Ziba Dehghani</text>
    <text x="36" y="29" font-family="Consolas, monospace" font-size="13" fill="#CFE0FF">github.com/zibadehghani</text>
  </g>
</svg>
